<form novalidate [formGroup]="form" (ngSubmit)="search()">
<div class="w-100 input-group">
  <input type="text" class="form-control form-control-lg rounded-start-5 border-end-0"  formControlName="query"/>
  <button class="btn btn-primary rounded-end-5" (click)="search()">
    <i class="far fas fa fa-search"></i>
  </button>
</div>
</form>
